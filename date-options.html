<!doctype html>
<html>
  <head>
    <title>Date Option</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="js.js"></script>
  </head>
  <body class="options-page">
    <div class="container">
      <h1>What are we gonna do?</h1>
    </div>
    <div class="date-grid">
      <div class="date-card">
        <button onclick="chooseDate('🎬 Film at home + cuddle')">
          🎬 Film at home + cuddle
        </button>
      </div>

      <div class="date-card">
        <button onclick="chooseDate('🍽 Dinner at Cafe Cook')">
          🍽 Dinner at Cafe Cook
        </button>
      </div>

      <div class="date-card">
        <button onclick="chooseDate('🌳 Dinner at the park')">
          🌳 Dinner at the park
        </button>
      </div>

      <div class="date-card">
        <button onclick="chooseDate('🕹 Arcade night')">🕹 Arcade night</button>
      </div>
    </div>
  </body>
</html>
